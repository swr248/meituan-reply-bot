name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r shop1/requirements.txt
          pip install -r shop2/requirements.txt || true

      - name: Verify shop implementation parity
        run: |
          for file in admin.py auth_ticket.py bot.py browser_common.py cookie_sync.py promo_scheduler.py rules.py state.py; do
            diff --exit-code shop1/$file shop2/$file
          done
          diff --exit-code shop1/capture/cookie_capture.py shop2/capture/cookie_capture.py

      - name: Run tests
        run: |
          python -m pytest -q \
            shop1/test_rules.py shop2/test_rules.py \
            shop1/test_bot_guards.py shop2/test_bot_guards.py \
            shop1/test_promo_scheduler.py shop2/test_promo_scheduler.py \
            shop1/test_admin_promo.py shop2/test_admin_promo.py \
            shop1/test_cookie_capture_auth.py shop2/test_cookie_capture_auth.py \
            shop1/test_cookie_reload.py shop2/test_cookie_reload.py \
            shop1/test_cookie_sync_atomic.py shop2/test_cookie_sync_atomic.py \
            master/test_auth_ticket.py
